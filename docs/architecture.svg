<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <!-- Standard Arrow Markers with robust auto orientation -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#0a66c2" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#7c3aed" />
    </marker>

    <style>
      .canvas { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
      .header-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase; }
      .node-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #0f172a; }
      .node-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #475569; }
      .tech-badge { font-family: "JetBrains Mono", monospace; font-size: 9px; font-weight: 600; fill: #64748b; }
      .line-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 10px; fill: #64748b; font-weight: 500; }
    </style>
  </defs>

  <!-- ==================== LAYER 1: BASE CANVAS ==================== -->
  <rect width="100%" height="100%" class="canvas" rx="12" />

  <!-- Column Headers -->
  <text x="140" y="45" class="header-text" text-anchor="middle">LinkedIn Tabs</text>
  <text x="400" y="45" class="header-text" text-anchor="middle">Extension SW (Service Worker)</text>
  <text x="680" y="45" class="header-text" text-anchor="middle">Popup UI</text>


  <!-- ==================== LAYER 2: NODE CARDS ==================== -->

  <!-- Column 1: LinkedIn Tabs -->
  <!-- Tab 1 -->
  <g transform="translate(50, 80)">
    <rect width="180" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="15" y="22" class="node-title">linkedin.com/*</text>
    <text x="15" y="38" class="node-desc">Active Feed Scrape</text>
  </g>
  <!-- Tab 2 -->
  <g transform="translate(50, 145)">
    <rect width="180" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="15" y="22" class="node-title">linkedin.com/in/*</text>
    <text x="15" y="38" class="node-desc">Profile Data Capture</text>
  </g>
  <!-- Tab 3 -->
  <g transform="translate(50, 210)">
    <rect width="180" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="15" y="22" class="node-title">linkedin.com/feed/*</text>
    <text x="15" y="38" class="node-desc">Engagement Queue UI</text>
  </g>
  <!-- Tab 4 -->
  <g transform="translate(50, 275)">
    <rect width="180" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="15" y="22" class="node-title">/sales/ssi</text>
    <text x="15" y="38" class="node-desc">SSI Pillars Scrape</text>
  </g>

  <!-- Storage Blocks (Left Bottom Column) -->
  <!-- chrome.storage.local -->
  <g transform="translate(50, 340)">
    <rect width="185" height="42" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <text x="12" y="18" class="node-title" style="font-size:11px">chrome.storage.local</text>
    <text x="12" y="30" class="node-desc" style="font-size:9px">ProfileContext, SSI snapshots</text>
  </g>
  <!-- IndexedDB -->
  <g transform="translate(50, 395)">
    <rect width="185" height="42" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <text x="12" y="18" class="node-title" style="font-size:11px">IndexedDB (Time-series)</text>
    <text x="12" y="30" class="node-desc" style="font-size:9px">Action log &amp; outcomes ledger</text>
  </g>

  <!-- Column 2: Content Scripts (Bridge) -->
  <g transform="translate(290, 175)">
    <rect width="220" height="70" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" />
    <text x="15" y="28" class="node-title" style="fill:#166534">Content Scripts</text>
    <text x="15" y="45" class="node-desc">linkedin-content.ts · ssi-content.ts</text>
    <text x="15" y="58" class="node-desc" style="fill:#15803d">DOM extraction &amp; injection</text>
  </g>

  <!-- Column 2: Background SW (The Brain) -->
  <g transform="translate(290, 315)">
    <rect width="220" height="95" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" />
    <text x="15" y="28" class="node-title" style="fill:#6b21a8">background.ts</text>
    <text x="15" y="45" class="node-desc">Message router &amp; Alarms</text>
    <text x="15" y="58" class="node-desc">SSI scheduler &amp; AI orchestrator</text>
    <rect x="15" y="68" width="190" height="18" rx="4" fill="#f3e8ff" />
    <text x="110" y="80" class="tech-badge" text-anchor="middle" style="fill:#7e22ce">MV3 SERVICE WORKER</text>
  </g>

  <!-- Column 3: Popup UI (Shifted to x=580 to prevent text overlap) -->
  <g transform="translate(580, 270)">
    <rect width="200" height="105" rx="10" fill="#fff5f5" stroke="#fecaca" stroke-width="1.5" />
    <text x="15" y="28" class="node-title" style="fill:#991b1b">popup.html / .ts</text>
    <text x="15" y="45" class="node-desc">Interactive dashboard UI</text>
    <text x="15" y="58" class="node-desc">Today | SSI | Profile | Settings</text>
    <rect x="15" y="70" width="170" height="18" rx="4" fill="#fee2e2" />
    <text x="100" y="82" class="tech-badge" text-anchor="middle" style="fill:#991b1b">VANILLA CSS / CHART.JS</text>
  </g>

  <!-- Column 3: OpenAI API (Shifted to x=580) -->
  <g transform="translate(580, 395)">
    <rect width="200" height="50" rx="8" fill="#fffafb" stroke="#ffd6e0" stroke-width="1" />
    <text x="15" y="22" class="node-title" style="fill:#be185d">OpenAI API</text>
    <text x="15" y="36" class="node-desc" style="fill:#9d174d">BYOK · gpt-4o-mini</text>
  </g>


  <!-- ==================== LAYER 3: CONNECTORS & TEXT ON TOP ==================== -->

  <!-- LinkedIn Tabs to Content Scripts -->
  <g>
    <path d="M 230 105 L 290 190" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
    <path d="M 230 170 L 290 205" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
    <path d="M 230 235 L 290 220" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
    <path d="M 230 300 L 290 235" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
  </g>

  <!-- Content Scripts to Background SW (Draw on top) -->
  <g>
    <path d="M 400 245 L 400 305" stroke="#0a66c2" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" />
    <rect x="406" y="266" width="162" height="16" rx="3" fill="#ffffff" opacity="0.92" />
    <text x="488" y="278" class="line-text" text-anchor="middle" fill="#0a66c2">chrome.runtime.sendMessage</text>
  </g>

  <!-- Background SW (Left Side) to Storage Blocks (Draw on top) -->
  <g>
    <!-- chrome.storage.local -->
    <path d="M 290 350 L 236 350" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
    <!-- IndexedDB -->
    <path d="M 290 380 C 265 380 250 400 236 410" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  </g>

  <!-- Background SW (Right Side) to Popup UI (Left Side) - (Perfect alignment, no card overlaps) -->
  <g>
    <path d="M 510 350 L 579 350" stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)" />
    <rect x="511" y="336" width="68" height="16" rx="3" fill="#ffffff" opacity="0.92" />
    <text x="545" y="348" class="line-text" text-anchor="middle" fill="#7c3aed">Message Port</text>
  </g>

  <!-- Background SW (Right Side) to OpenAI API (Left Side) -->
  <g>
    <path d="M 510 385 L 579 415" stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)" />
    <rect x="511" y="396" width="68" height="16" rx="3" fill="#ffffff" opacity="0.92" />
    <text x="545" y="408" class="line-text" text-anchor="middle">fetch (BYOK)</text>
  </g>

</svg>
