name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package
        run: cd dist && zip -r ../linkmate-${{ github.ref_name }}.zip . && cd ..
      - uses: softprops/action-gh-release@v2
        with:
          files: linkmate-${{ github.ref_name }}.zip
          generate_release_notes: true
          # Overwrite (don't append) on tag re-push — softprops appends body
          # by default which produced duplicated changelog text on v0.2.0
          # after a history rewrite moved the tag.
          append_body: false
